<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CISSP Book2 — 8th Edition Study Guide</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<!-- ===== Header ===== -->
<header class="app-header">
  <button class="sidebar-toggle icon-btn" id="sidebarToggle" title="Toggle sidebar">☰</button>
  <div class="header-title">
    CISSP <span>All-in-One · 8th Ed.</span>
  </div>
  <div class="header-search">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search all chapters… (press / to focus)" autocomplete="off" spellcheck="false">
    <div class="search-results-dropdown" id="searchDropdown"></div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="themeToggle" title="Toggle dark/light mode">🌙</button>
    <button class="icon-btn" title="Bookmarks" onclick="App.switchSidebarTab('bookmarks')">
      🔖
      <span class="badge" id="bookmarkCount" style="display:none">0</span>
    </button>
    <button class="icon-btn" onclick="App.goHome()" title="Home">⌂</button>
  </div>
</header>

<!-- ===== Sidebar ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" data-tab="toc">Contents</button>
    <button class="sidebar-tab" data-tab="bookmarks">Bookmarks</button>
    <button class="sidebar-tab" data-tab="progress">Progress</button>
  </div>
  <div class="sidebar-panel active" id="tocPanel"></div>
  <div class="sidebar-panel" id="bookmarksPanel"></div>
  <div class="sidebar-panel" id="progressPanel"></div>
</aside>

<!-- ===== Main Content ===== -->
<main class="main-content" id="mainContent"></main>

<!-- ===== TTS Bar ===== -->
<div class="tts-bar hidden" id="ttsBar">
  <button class="tts-play-btn" id="ttsPlayBtn" title="Play / Pause (Space)">▶</button>
  <div class="tts-info">
    <div class="tts-section-name" id="ttsSectionName">—</div>
    <div class="tts-progress"><div class="tts-progress-fill" id="ttsProgressFill" style="width:0%"></div></div>
  </div>
  <div class="tts-controls">
    <select class="tts-speed-select" id="ttsSpeed" title="Playback speed">
      <option value="0.75">0.75×</option>
      <option value="1" selected>1×</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
      <option value="2">2×</option>
    </select>
    <button class="tts-stop-btn" id="ttsStop" title="Stop (Esc)">■ Stop</button>
  </div>
</div>

<!-- ===== Keyboard hint overlay (shown once) ===== -->
<div id="kbdHint" style="display:none;position:fixed;bottom:70px;right:16px;background:var(--paper);border:1px solid var(--rule);border-radius:8px;padding:14px 16px;font-size:0.78rem;color:var(--ink-soft);box-shadow:var(--shadow);z-index:200;max-width:220px;">
  <div style="font-weight:600;margin-bottom:8px;color:var(--ink)">Keyboard shortcuts</div>
  <div><kbd class="kbd-hint">/</kbd> Search</div>
  <div style="margin-top:4px"><kbd class="kbd-hint">Space</kbd> Play/Pause TTS</div>
  <div style="margin-top:4px"><kbd class="kbd-hint">n</kbd> / <kbd class="kbd-hint">p</kbd> Next/Prev section</div>
  <div style="margin-top:4px"><kbd class="kbd-hint">d</kbd> Toggle dark mode</div>
  <div style="margin-top:4px"><kbd class="kbd-hint">h</kbd> Home</div>
  <div style="margin-top:4px"><kbd class="kbd-hint">Esc</kbd> Close / Stop TTS</div>
  <button onclick="document.getElementById('kbdHint').style.display='none';localStorage.setItem('book2_kbdhint','1')"
          style="margin-top:10px;width:100%;padding:5px;background:var(--accent);color:white;border:none;border-radius:4px;cursor:pointer;font-size:0.78rem">Got it</button>
</div>

<script>
  // Show keyboard hint on first visit
  if (!localStorage.getItem('book2_kbdhint')) {
    setTimeout(() => document.getElementById('kbdHint').style.display = 'block', 1500);
  }
</script>

<script src="assets/app.js"></script>
</body>
</html>
